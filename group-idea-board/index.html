<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Group Idea Board</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>💡 Group Idea Board</h1>
            <p>Share your creative thoughts with the team!</p>
        </header>

        <section class="submission-form">
            <form id="ideaForm">
                <input type="hidden" id="editId">
                <div class="form-group">
                    <input type="text" id="userName" placeholder="Your Name" required>
                </div>
                <div class="form-group">
                    <textarea id="ideaText" placeholder="What's your brilliant idea?" required></textarea>
                </div>
                <button type="submit" id="submitBtn">Post Idea</button>
            </form>
        </section>

        <main class="idea-board" id="ideaBoard">
            <!-- Idea cards will be injected here -->
        </main>
    </div>

    <!-- Delete Confirmation Modal -->
    <div id="deleteModal" class="modal">
        <div class="modal-content">
            <h3>Confirm Deletion</h3>
            <p>Are you sure you want to remove this idea? This action cannot be undone.</p>
            <div class="modal-actions">
                <button id="cancelDelete" class="btn-secondary">Cancel</button>
                <button id="confirmDelete" class="btn-danger">Delete</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
